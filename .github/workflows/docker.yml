name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: moi-kalebbe

jobs:
  build-app:
    name: Next.js App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push — scrapper
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/scrapper:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://zrkktupibgnebhdxofpg.supabase.co
            NEXT_PUBLIC_R2_PUBLIC_URL=https://pub-0eed0550b68f4cc68503c01747ecd16d.r2.dev

  build-worker:
    name: FFmpeg Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push — scrapper-worker
        uses: docker/build-push-action@v5
        with:
          context: ./workers/ffmpeg-worker
          file: ./workers/ffmpeg-worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/scrapper-worker:latest

  build-cron:
    name: Cron Runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push — scrapper-cron
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cron
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/scrapper-cron:latest

  deploy:
    name: Deploy no Servidor
    runs-on: ubuntu-latest
    needs: [build-app, build-worker, build-cron]

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /root/deploy-scrapper.sh
